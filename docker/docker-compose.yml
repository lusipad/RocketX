# Reproducible local/self-hosted stack: RocketX Web + Rocket.Chat + MongoDB.
# Start: docker compose -f docker/docker-compose.yml up -d --build
# Default development account: admin / rcxdev123 (change before non-local use).
name: rcx-dev

services:
  rocketx:
    image: rocketx/web:local
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      rocketchat:
        condition: service_healthy
    ports:
      - "${ROCKETX_WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:8.6.1
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      ROOT_URL: ${ROCKETCHAT_ROOT_URL:-http://localhost:3300}
      PORT: 3000
      DEPLOY_METHOD: docker
      ADMIN_USERNAME: ${ROCKETCHAT_ADMIN_USERNAME:-admin}
      ADMIN_PASS: ${ROCKETCHAT_ADMIN_PASSWORD:-rcxdev123}
      ADMIN_EMAIL: ${ROCKETCHAT_ADMIN_EMAIL:-admin@rcx.local}
      OVERWRITE_SETTING_Show_Setup_Wizard: completed
      OVERWRITE_SETTING_UTF8_Channel_Names_Validation: '[0-9a-zA-Z-_.一-龥぀-ヿ]+'
      OVERWRITE_SETTING_Message_AlwaysSearchRegExp: 'true'
      'OVERWRITE_SETTING_Search.defaultProvider.GlobalSearchEnabled': 'true'
      OVERWRITE_SETTING_Message_Read_Receipt_Enabled: 'true'
      OVERWRITE_SETTING_Message_Read_Receipt_Store_Users: 'true'
      OVERWRITE_SETTING_API_Enable_CORS: 'true'
      OVERWRITE_SETTING_API_CORS_Origin: '*'
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${ROCKETCHAT_PORT:-3300}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/info').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 30

  mongodb:
    image: mongo:7.0.21
    restart: unless-stopped
    command: mongod --replSet rs0 --oplogSize 128 --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }"
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 30

volumes:
  mongodb_data:
