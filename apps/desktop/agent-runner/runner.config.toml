cli_auth_credentials_store = "file"

[features]
request_permissions_tool = true

[permissions.rocketx_read.filesystem]
":minimal" = "read"
"/workspace" = "read"
"/workspace/**/.env" = "deny"
"/workspace/**/.env.*" = "deny"
"/workspace/**/id_rsa" = "deny"
"/workspace/**/id_dsa" = "deny"
"/workspace/**/id_ecdsa" = "deny"
"/workspace/**/id_ed25519" = "deny"
"/workspace/**/*.pem" = "deny"
"/workspace/**/*.key" = "deny"
"/workspace/**/*.p12" = "deny"
"/workspace/**/*.pfx" = "deny"
"/workspace/**/.ssh/**" = "deny"
"/workspace/**/.aws/**" = "deny"
"/workspace/**/.azure/**" = "deny"
"/workspace/**/.gnupg/**" = "deny"
"/workspace/**/.kube/**" = "deny"
"/workspace/**/credentials" = "deny"
"/workspace/**/credentials/**" = "deny"
"/workspace/**/secrets" = "deny"
"/workspace/**/secrets/**" = "deny"
"/workspace/**/credentials.json" = "deny"
"/workspace/**/credentials.yaml" = "deny"
"/workspace/**/credentials.yml" = "deny"
"/workspace/**/credentials.toml" = "deny"
"/workspace/**/credentials.ini" = "deny"
"/workspace/**/secret.json" = "deny"
"/workspace/**/secrets.json" = "deny"
"/workspace/**/config.json" = "deny"
"/home/node/.codex/auth.json" = "deny"
glob_scan_max_depth = 8

[permissions.rocketx_write.filesystem]
":minimal" = "read"
"/workspace" = "write"
"/workspace/**/.env" = "deny"
"/workspace/**/.env.*" = "deny"
"/workspace/**/id_rsa" = "deny"
"/workspace/**/id_dsa" = "deny"
"/workspace/**/id_ecdsa" = "deny"
"/workspace/**/id_ed25519" = "deny"
"/workspace/**/*.pem" = "deny"
"/workspace/**/*.key" = "deny"
"/workspace/**/*.p12" = "deny"
"/workspace/**/*.pfx" = "deny"
"/workspace/**/.ssh/**" = "deny"
"/workspace/**/.aws/**" = "deny"
"/workspace/**/.azure/**" = "deny"
"/workspace/**/.gnupg/**" = "deny"
"/workspace/**/.kube/**" = "deny"
"/workspace/**/credentials" = "deny"
"/workspace/**/credentials/**" = "deny"
"/workspace/**/secrets" = "deny"
"/workspace/**/secrets/**" = "deny"
"/workspace/**/credentials.json" = "deny"
"/workspace/**/credentials.yaml" = "deny"
"/workspace/**/credentials.yml" = "deny"
"/workspace/**/credentials.toml" = "deny"
"/workspace/**/credentials.ini" = "deny"
"/workspace/**/secret.json" = "deny"
"/workspace/**/secrets.json" = "deny"
"/workspace/**/config.json" = "deny"
"/home/node/.codex/auth.json" = "deny"
glob_scan_max_depth = 8
