[package]
name = "rocketx"
version = "0.3.0"
description = "RocketX 桌面客户端 - 飞书体验的 Rocket.Chat 客户端"
authors = ["lusipad"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-http = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = true
