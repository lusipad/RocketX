name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 Codex CLI
        run: npm install --global @openai/codex@0.144.4

      - name: Codex 协议生成物
        run: pnpm codex:protocol:check

      - name: 类型检查
        run: pnpm -r typecheck

      - name: 纯函数测试（拼音检索、日期格式）
        run: pnpm test:pure

      - name: 回归测试（并发、分页与状态隔离）
        run: pnpm test:regression

      - name: 安装 Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: UI 渲染冒烟（登录、消息、搜索与右键菜单）
        run: pnpm test:ui

      - name: 构建 Web 客户端
        run: pnpm --filter @rcx/web build

      - name: 应用 SDK、CLI 与 clean-room 脚手架
        run: pnpm test:ecosystem

  windows-desktop-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Windows 桌面端单元与协议测试
        working-directory: apps/desktop/src-tauri
        run: cargo test --locked
