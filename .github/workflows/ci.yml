name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Codex 协议生成物
        run: pnpm codex:protocol:check

      - name: 类型检查
        run: pnpm -r typecheck

      - name: 纯函数测试（拼音检索、日期格式）
        run: pnpm test:pure

      - name: 回归测试（并发、分页与状态隔离）
        run: pnpm test:regression

      - name: Agent Runner 隔离边界
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          pnpm agent:runner:test
        env:
          # 托管机的 Docker-in-Docker 禁止 bubblewrap 配置 loopback；从刚构建的
          # 产品镜像提取同一二进制和资源，在宿主执行同一权限 profile。
          ROCKETX_RUNNER_TEST_HOST: "1"

      - name: 构建 Web 客户端
        run: pnpm --filter @rcx/web build

      - name: 应用 SDK、CLI 与 clean-room 脚手架
        run: pnpm test:ecosystem
