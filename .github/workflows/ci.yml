name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 类型检查
        run: pnpm -r typecheck

      - name: 纯函数测试（拼音检索、日期格式）
        run: pnpm test:pure

      - name: 回归测试（并发、分页与状态隔离）
        run: pnpm test:regression

      - name: Agent Runner 隔离边界
        run: pnpm agent:runner:test

      - name: 构建 Web 客户端
        run: pnpm --filter @rcx/web build
