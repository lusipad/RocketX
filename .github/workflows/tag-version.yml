name: Tag Version

# 从远程执行环境（Claude Code on the web 等）发版时用：那边的 git 代理只允许推分支、
# 不允许推 tag，MCP 集成也没有 workflow dispatch 权限。于是把「打标签」做成对
# release/v* 分支 push 的响应：推一个 release/v0.10.0 分支（指向要发版的提交），
# 本工作流在该提交上创建 v0.10.0 标签、触发桌面构建，然后把临时分支删掉。
#
# 注意：GITHUB_TOKEN 推的 tag 不会触发 on:push:tags（GitHub 防递归），但
# workflow_dispatch 不在防递归之列 —— 所以显式再 dispatch 一次 desktop.yml，
# 以 tag 为 ref 时其行为与直接 push tag 完全一致（构建 + 草稿 Release）。
on:
  push:
    branches: ['release/v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '标签名（如 v0.10.0），打在当前分支最新提交上'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: 核验主分支、版本与发布证据
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="$INPUT_TAG"
          [ -n "$TAG" ] || TAG="${GITHUB_REF_NAME#release/}"
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi
          node scripts/verify-release.mjs --tag "$TAG" --require-ready
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: 创建并推送标签
        run: |
          git tag -a "$TAG" -m "RocketX $TAG"
          git push origin "refs/tags/$TAG"

      - name: 触发桌面构建与草稿 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run desktop.yml --ref "$TAG" -R "${{ github.repository }}"

      - name: 清理临时 release 分支
        if: github.event_name == 'push'
        run: git push origin --delete "$GITHUB_REF_NAME" || true
