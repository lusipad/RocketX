name: Desktop Build

# 打 v* 标签自动构建并准备草稿 Release；也可手动触发生成安装包产物
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_type == 'tag' && 'main' || github.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: 核验发布标签来源与合同
        if: github.ref_type == 'tag'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          git fetch origin main --tags
          test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = "tag"
          release_sha="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          test "$release_sha" = "$(git rev-parse origin/main)"
          git checkout --detach "$release_sha"
          node scripts/verify-release.mjs --tag "$RELEASE_TAG" --require-ready

      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 安装 Codex CLI
        run: npm install --global @openai/codex@0.144.4
      - name: 发布代码门禁
        run: |
          pnpm codex:protocol:check
          pnpm -r typecheck
          pnpm test:pure
          pnpm test:regression
          pnpm test:ecosystem
          pnpm package:plugins -- --out dist/plugins
          pnpm --filter @rcx/web build

  build:
    needs: gate
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri
            plugins/intranet-link/native

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Rust 单元测试
        run: |
          cargo test --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
          cargo test --locked --manifest-path plugins/intranet-link/native/Cargo.toml

      - name: 构建桌面客户端
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          # 打标签时创建草稿 Release 并上传安装包
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('RocketX {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: 上传构建产物（手动触发时）
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: rocketx-windows-latest
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/**/release/bundle/**/*.exe
          if-no-files-found: warn

  prepare-release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: 核验 Windows 产物并准备草稿 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/verify-release.mjs --tag "$GITHUB_REF_NAME" --require-ready
          test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" = "true"
          mkdir release-assets
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir release-assets
          pnpm package:plugins -- --tag "$GITHUB_REF_NAME" --out release-assets
          node scripts/verify-release-assets.mjs --tag "$GITHUB_REF_NAME" --directory release-assets
          gh release upload "$GITHUB_REF_NAME" release-assets/rocketx-plugins-${GITHUB_REF_NAME#v}.zip --repo "$GITHUB_REPOSITORY" --clobber
          cd release-assets
          find . -maxdepth 1 -type f ! -name '*.sig' ! -name 'SHA256SUMS.txt' -printf '%f\n' | sort | while read -r file; do
            sha256sum "$file"
          done > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt
          cd ..
          node scripts/release-notes.mjs --tag "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          gh release upload "$GITHUB_REF_NAME" release-assets/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file RELEASE_NOTES.md
