name: Desktop Build

# 打 v* 标签自动构建并发布 Release（草稿）；也可手动触发生成安装包产物
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 安装 Codex CLI
        run: npm install --global @openai/codex@0.144.4
      - name: v1.0 发布门禁
        run: |
          pnpm codex:protocol:check
          pnpm -r typecheck
          pnpm test:pure
          pnpm test:regression
          pnpm test:ecosystem
          pnpm --filter @rcx/web build

  build:
    needs: gate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: 安装 Linux 依赖（webkit2gtk 等）
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Rust 单元测试
        working-directory: apps/desktop/src-tauri
        run: cargo test --locked

      - name: 构建桌面客户端
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          # 打标签时创建草稿 Release 并上传安装包
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('RocketX {0}', github.ref_name) || '' }}
          releaseDraft: true
          args: ${{ matrix.args }}

      - name: 上传构建产物（手动触发时）
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: rocketx-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/**/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: warn

  publish:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 核验三平台产物并发布 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "$assets" | grep -Eiq '\.(msi|exe)$'
          echo "$assets" | grep -Eiq '\.dmg$'
          echo "$assets" | grep -Eiq '\.(AppImage|deb|rpm)$'
          mkdir release-assets
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir release-assets
          find release-assets -maxdepth 1 -type f ! -name '*.sig' -printf '%f\n' | sort | while read -r file; do
            sha256sum "release-assets/$file"
          done > SHA256SUMS.txt
          gh release upload "$GITHUB_REF_NAME" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
